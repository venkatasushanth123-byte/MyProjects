<div class="dashboard-container">
  <h2 class="title">Admin Dashboard</h2>

  <div class="table-card">
    <table class="leave-table">
      <thead>
        <tr>
          <th>Student</th>
          <th>Date</th>
          <th>Reason</th>
          <th>Status</th>
          <th class="center">Action</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let leave of leaves">
          <td>{{ leave.studentName }}</td>
          <td>{{ leave.date | date:'mediumDate' }}</td>
          <td>{{ leave.reason }}</td>

          <td>
            <span 
              class="status"
              [ngClass]="{
                'pending': leave.status === 'PENDING',
                'approved': leave.status === 'APPROVED',
                'rejected': leave.status === 'REJECTED'
              }">
              {{ leave.status }}
            </span>
          </td>

          <td class="center">
            <button 
              class="btn approve"
              (click)="approveLeave(leave.leaveId)"
              [disabled]="leave.status !== 'PENDING'">
              ✔ Approve
            </button>

            <button 
              class="btn reject"
              (click)="rejectLeave(leave.leaveId)"
              [disabled]="leave.status !== 'PENDING'">
              ✖ Reject
            </button>
          </td>
        </tr>

        <tr *ngIf="leaves.length === 0">
          <td colspan="5" class="no-data">No leave requests found</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
